<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 75" width="320" height="75">
  <!-- Logo CFR horizontal — versión positiva (fondo blanco) -->

  <!-- Fondo -->
  <rect width="320" height="75" fill="#FFFFFF"/>

  <!-- ISOTIPO -->
  <g transform="translate(4, 8)">
    <circle cx="46" cy="52" r="10" fill="none" stroke="#1A3A5C" stroke-width="2"/>
    <circle cx="46" cy="52" r="5" fill="#1A3A5C"/>
    <path d="M 10 30 A 44 44 0 0 1 82 30" fill="none" stroke="#3A6FA0" stroke-width="0.9" opacity="0.5"/>
    <circle cx="10" cy="30" r="6.5" fill="none" stroke="#3A6FA0" stroke-width="1.8"/>
    <circle cx="10" cy="30" r="2.8" fill="#3A6FA0"/>
    <circle cx="46" cy="10" r="6.5" fill="none" stroke="#3A6FA0" stroke-width="1.8"/>
    <circle cx="46" cy="10" r="2.8" fill="#3A6FA0"/>
    <circle cx="82" cy="30" r="6.5" fill="none" stroke="#3A6FA0" stroke-width="1.8"/>
    <circle cx="82" cy="30" r="2.8" fill="#3A6FA0"/>
    <line x1="10" y1="30" x2="46" y2="52" stroke="#3A6FA0" stroke-width="0.7" opacity="0.4"/>
    <line x1="46" y1="10" x2="46" y2="52" stroke="#3A6FA0" stroke-width="0.7" opacity="0.4"/>
    <line x1="82" y1="30" x2="46" y2="52" stroke="#3A6FA0" stroke-width="0.7" opacity="0.4"/>
  </g>

  <!-- Separador vertical -->
  <line x1="112" y1="10" x2="112" y2="68" stroke="#1A3A5C" stroke-width="0.5" opacity="0.2"/>

  <!-- TEXTO -->
  <text x="126" y="28" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#1A3A5C" letter-spacing="4" font-weight="bold">CENTRO</text>
  <text x="126" y="46" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#1A3A5C" letter-spacing="4" font-weight="bold">FORMACIÓN</text>
  <text x="126" y="64" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#1A3A5C" letter-spacing="4" font-weight="bold">ROBÓTICA</text>
</svg>